name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Rename APK with short SHA
      run: cp app/build/outputs/apk/debug/*.apk autocracker-debug-${{ github.sha }}.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: autocracker-debug-${{ github.sha }}
        path: autocracker-debug-${{ github.sha }}.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-${{ github.run_number }}
        release_name: Debug Build ${{ github.run_number }}
        body: |
          ## 自动构建 Release
          
          - **Build Number**: ${{ github.run_number }}
          - **Commit SHA**: ${{ github.sha }}
          - **构建时间**: ${{ github.event.head_commit.timestamp }}
          
          ---
          自动构建并发布的 Debug APK
        files: autocracker-debug-${{ github.sha }}.apk
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
